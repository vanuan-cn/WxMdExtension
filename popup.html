<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>公众号 Markdown 编辑器</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 12px;
      color: #07c160;
    }
    p {
      margin: 0 0 12px;
      line-height: 1.6;
      color: #555;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 8px 0;
      text-align: center;
      background: #07c160;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn:hover {
      background: #06ad56;
    }
    .tips {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #888;
    }
    .tips code {
      background: #f2f2f2;
      padding: 1px 4px;
      border-radius: 2px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>公众号 Markdown 编辑器</h1>
  <p>在公众号图文编辑页面，点击右下角的 <strong>M</strong> 按钮即可打开 Markdown 编辑器。</p>
  <button class="btn" id="open-doc">查看使用文档</button>
  <div class="tips">
    支持语法：<code>#</code> <code>**</code> <code>``</code> <code>```</code> <code>-</code> <code>|</code> 等
  </div>
  <script>
    document.getElementById('open-doc').addEventListener('click', () => {
      chrome.tabs.create({ url: 'https://github.com/doocs/md' });
    });
  </script>
</body>
</html>
